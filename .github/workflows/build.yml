name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            ext: .exe
          - os: macos-latest
            platform: mac
            ext: .dmg
          - os: ubuntu-latest
            platform: linux
            ext: .AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows
        if: matrix.platform == 'win'
        run: pnpm run build:win

      - name: Build macOS
        if: matrix.platform == 'mac'
        run: pnpm run build:mac

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create ZIP (Windows)
        if: matrix.platform == 'win'
        run: |
          cd dist
          Compress-Archive -Path *.exe,*.yml -DestinationPath betterjepp-${{ steps.version.outputs.VERSION }}-win.zip

      - name: Create ZIP (macOS)
        if: matrix.platform == 'mac'
        run: |
          cd dist
          zip betterjepp-${{ steps.version.outputs.VERSION }}-mac.zip *.dmg

      - name: Create ZIP (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          zip betterjepp-${{ steps.version.outputs.VERSION }}-linux.zip *.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*.zip
          retention-days: 5

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
